# Build a multi-arch image (linux/arm/v7 for RB3011 and linux/arm64 for
# RB5009 / CHR / Apple Silicon) and push to Docker Hub.
#
# Triggers:
#   - push to main          → tags: latest, main, sha-<shortsha>
#   - push of v* tag        → tags: <X.Y.Z>, <X.Y>, latest
#   - workflow_dispatch     → manual run, tags: dispatch-<shortsha>
#
# Required repo secrets:
#   DOCKERHUB_USERNAME  → Docker Hub username (also the namespace for the image)
#   DOCKERHUB_TOKEN     → Docker Hub access token with read+write scopes
#
# Optional repo variable (configure in Settings → Actions → Variables):
#   DBC_ENDPOINT        → Docker Build Cloud endpoint, e.g. "myorg/builder-name"
#                         If set, the build runs on DBC's native arm builders
#                         (no QEMU emulation, ~3-5x faster). If unset, falls
#                         back to QEMU on the GitHub-hosted x86 runner.
#
# This workflow only runs on push events and manual dispatch — pull-request
# builds from forks do NOT trigger it. Combined with branch protection on
# main, that means only admins (you) can ship an image.

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Hard-cap permissions; this workflow only needs to read the source.
permissions:
  contents: read

jobs:
  build:
    name: build & push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only one build at a time per ref so a fast-follow push cancels the
    # previous one (saves Docker Build Cloud minutes).
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU is only used as a fallback if DBC isn't configured. With DBC,
      # the cloud builders are native and this is a no-op.
      - name: Set up QEMU (fallback for non-DBC builds)
        if: ${{ vars.DBC_ENDPOINT == '' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7,linux/arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # If DBC is configured, switch to the cloud driver. Otherwise use
          # the default docker-container driver.
          driver: ${{ vars.DBC_ENDPOINT != '' && 'cloud' || 'docker-container' }}
          endpoint: ${{ vars.DBC_ENDPOINT }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tailscale-router-mikrotik
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dispatch-{{sha}},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=tailscale-router-mikrotik
            org.opencontainers.image.description=Minimal Tailscale subnet-router OCI image for MikroTik RouterOS
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache via GHA cache when not using DBC (DBC has its own cache).
          cache-from: ${{ vars.DBC_ENDPOINT == '' && 'type=gha' || '' }}
          cache-to: ${{ vars.DBC_ENDPOINT == '' && 'type=gha,mode=max' || '' }}
          provenance: false
